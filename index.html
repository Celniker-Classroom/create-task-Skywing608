<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Recommendation</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <h1>Clothing Recommendation</h1>
            
            <div class="input-group">
                <h3>Your Name</h3>
                <input type="text" id="myInput" placeholder="Enter your name" />
            </div>

            <div class="input-group">
                <h3>Current Temperature</h3>
                <input type="number" id="currentTemp" placeholder="Temperature" min="-50" max="120" />
            </div>
           
            <div class="input-group">
                <h3>Weather Condition</h3>
                <div class="radio-group">
                    <input type="radio" name="condition" id="condition1" value="Cloudy">
                    <label for="condition1">Cloudy</label>
                    
                    <input type="radio" name="condition" id="condition2" value="Sunny">
                    <label for="condition2">Sunny</label>
                    
                    <input type="checkbox" name="rain" id="condition3" value="Rainy">
                    <label for="condition3">Rainy</label>
                </div>
            </div>
            
            <div class="button-group">
                <button id="btnOutput">Get Recommendation</button>
                <button id="btnReset">Reset</button>
            </div>
            
            <div id="output"></div>
        </div>

        <div class="past-recs-section">
            <h3 class="pastRecs-title">Past Recommendations</h3>
            <button id="btnResetTable">Clear History</button>
            <table class="pastRecs">
                <tbody>
                    <tr><td id="pastRec1">_</td></tr>
                    <tr><td id="pastRec2">_</td></tr>
                    <tr><td id="pastRec3">_</td></tr>
                    <tr><td id="pastRec4">_</td></tr>
                    <tr><td id="pastRec5">_</td></tr>
                </tbody>
            </table>

            <div class="color-selector-section">
                <h3>Background Color</h3>
                <div class="color-controls">
                    <input type="color" id="bgColorPicker" value="#667eea" title="Pick custom color">
                    <div class="preset-colors">
                        <button class="preset-btn" style="background-color: #667eea;" title="Blue"></button>
                        <button class="preset-btn" style="background-color: #764ba2;" title="Purple"></button>
                        <button class="preset-btn" style="background-color: #f093fb;" title="Pink"></button>
                        <button class="preset-btn" style="background-color: #4facfe;" title="Cyan"></button>
                        <button class="preset-btn" style="background-color: #43e97b;" title="Green"></button>
                        <button class="preset-btn" style="background-color: #fa709a;" title="Red"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
