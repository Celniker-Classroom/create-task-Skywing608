<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <!--I have a few boxes for inputs. The first is to 
    get the users name while the next 
    is to get the current temperature for the user. 
    Based off of this the website will 
    recommend peices of clothing from a list with its 
    heat rating for the weather. The 
    next choices are radio and checkboxes to find if it 
    is sunny, cloudy, or rainy. The
    website will then use these to help reccomend clothes as well as recommend an umbrella
    or not. The button at the bottom will show your result in a box below. The reset button
    will reset all of the boxes back to blank. -->
    <h1>Clothing Recommedation</h1>
    <h3>Your Name</h3>
    <input type="text" id="myInput" placeholder="Enter your name" />

    <h3>Current Temperature</h3>
    <input type="text" id="currentTemp" placeholder="Please enter the current Temperature:" />
   
    <h3>Weather Condition</h3>
    <input type="radio" name="Condition" id="condition1" value="Cloudy"><label for="condtion1">Cloudy</label>
    <input type="radio" name="Condition" id="condition2" value="Sunny"><label for="condtion2">Sunny</label>
    <input type="checkbox" name="Condition" id="condition3" value="Rainy"><laber for="condition3">Rainy</laber>
    
    <br><br>
    <button id="btnOutput">Recommend</button>
    <button id="btnReset" >Reset</button>
    <p id="output" ></p>


</body>
</html>
